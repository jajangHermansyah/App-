<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      
    <title>Editor Gambar Seamless</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: #ccc;
            overflow: hidden;
            touch-action: none;
        }

        .ui-panel {
            width: 100%;
            max-width: 500px;
            background-color: #333;
            border-bottom-left-radius: 0px;
            border-bottom-right-radius: 0px;
            padding: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            z-index: 20;
            flex-shrink: 0;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
            justify-content: center;
        }

        .icon-btn {
            background-color: #2e5873;
            border: 1px solid #0088c7;
            border-radius: 6px;
            padding: 3px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            color: white;
            flex: 0 0 calc((100% - 48px) / 9);
            height: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            position: relative;
        }

        .icon-btn:active {
            background-color: #00ffff;
        }

        .icon-btn.active {
            background-color: #ff3b30;
            border-color: #ff3b30;
        }

        #btnRopeMode.active {
            background-color: #4caf50;
            border-color: #4caf50;
        }

        #btnWaveBrush.active {
            background-color: #2196f3;
            border-color: #2196f3;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.7); }
            70% { box-shadow: 0 0 0 5px rgba(33, 150, 243, 0); }
            100% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0); }
        }

        #btnShift.active {
            background-color: #ffcc00;
            color: #000;
            border-color: #ffcc00;
        }

        .menu-text {
            font-size: 7px;
            margin-top: 2px;
            color: white;
        }

        .settings-panel {
            display: none;
            margin-top: 8px;
            background: #2a2a2a;
            padding: 8px;
            border-radius: 10px;
            font-size: 7px;
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        input[type="number"] {
            background-color: #1a1a1a;
            border: 1px solid #0088c7;
            color: white;
            padding: 3px;
            width: 50px;
            border-radius: 4px;
            font-size: 8px;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .slider-row label {
            width: 80px;
            font-size: 11px;
            text-align: right;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: #007aff;
            height: 3px;
        }

        .value-label {
            width: 25px;
            text-align: left;
            font-size: 11px;
            color: #aaa;
        }

        .wave-type-buttons {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            justify-content: center;
        }
        
        .wave-type-btn {
            background-color: #444;
            border: 1px solid #666;
            border-radius: 4px;
            padding: 3px 8px;
            cursor: pointer;
            font-size: 10px;
            color: white;
            transition: 0.2s;
        }
        
        .wave-type-btn.active {
            background-color: #2196f3;
            border-color: #2196f3;
        }
        
        .wave-type-btn:active {
            background-color: #00ffff;
        }

        #canvasBox {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            touch-action: none;
        }

        #canvasBox.shift-mode {
            cursor: crosshair;
        }

        #viewCanvas {
            background-color: #ffffff;
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%, #eee),
            linear-gradient(45deg, #eee 25%, white 25%, white 75%, #eee 75%, #eee);
            background-size: 20px 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            image-rendering: pixelated;
        }

        .rope-indicator {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #4caf50;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            pointer-events: none;
            z-index: 100;
            font-family: monospace;
        }
        
        .seamless-hint {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #ffcc00;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            pointer-events: none;
            z-index: 100;
            font-family: monospace;
        }
        
        .wave-hint {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(33,150,243,0.9);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            pointer-events: none;
            z-index: 100;
            font-family: monospace;
            transition: 0.3s;
        }
        
        /* Layer Panel Styling */
        #layerPanel {
            position: fixed;
            right: 10px;
            top: 90px;
            background: #1e1e2f;
            padding: 5px;
            border-radius: 12px;
            display: none;
            z-index: 999;
            max-height: 250px;
            overflow: auto;
            backdrop-filter: blur(8px);
            background-color: rgba(30,30,40,0.95);
            border: 1px solid #4a6a8a;
            min-width: 100px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        
        #layerPanel button {
            background: #800000;
            border: none;
            color: white;
            padding: 3px 4px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 9px;
            font-weight: 700;
            transition: 0.2s;
        }
        
        #layerPanel button:active {
            background: #00aaff;
        }
        
        .layer-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            background: #2a2a2a;
            padding: 3px 5px;
            border-radius: 5px;
            border-left: 3px solid #4caf50;
        }
        
        .layer-item.active-layer {
            border-left-color: #ffcc00;
            background: #008cba;
        }
        
        .layer-name {
            flex: 1;
            font-size: 8px;
             font-weight: 700;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }
        
        .layer-name:hover {
            background: #3a6a8a;
        }
        
        .layer-actions {
            display: flex;
            gap: 5px;
        }
        
        .layer-actions button {
            background: #444;
            font-size: 8px;
            padding: 2px 6px;
        }
        
        .add-layer-btn {
            width: 100%;
            margin-bottom: 10px;
            background: #4caf50;
        }
    </style>
</head>
<body>

<div class="ui-panel">
    <div class="toolbar">
        <button class="icon-btn" id="btnLoadImage">📂<span class="menu-text">gambar</span></button>
        <button class="icon-btn" id="btnLoadBrush">🎨<span class="menu-text">brush</span></button>
        <button class="icon-btn" id="btnDraw">🖌️<span class="menu-text">draw</span></button>
        <button class="icon-btn active" id="btnMove">✋<span class="menu-text">geser</span></button>
        <button class="icon-btn" id="btnShift">🔄<span class="menu-text">offset</span></button>
         <button class="icon-btn" id="btnMirror">🪞<span class="menu-text">mirror</span></button>
        <button class="icon-btn" id="btnWaveBrush">🌊<span class="menu-text">wave</span></button>
        <button class="icon-btn" id="btnRopeMode">⛓️<span class="menu-text">rope</span></button>
        <button class="icon-btn" id="btnSoftBrush">🔵<span class="menu-text">soft</span></button>
        <button class="icon-btn" id="btnRotate">🌀<span class="menu-text">rot90</span></button>
        <button class="icon-btn" id="btnUndo">↩️<span class="menu-text">undo</span></button>
        <button class="icon-btn" id="btnRedo">↪️<span class="menu-text">redo</span></button>
        <button class="icon-btn" id="btnFlipY">↕️<span class="menu-text">flip Y</span></button>
        <button class="icon-btn" id="btnFlipX">↔️<span class="menu-text">flip X</span></button>
         <button class="icon-btn" id="btnCircularWrap">🌍<span class="menu-text">wrap</span></button>
        <button class="icon-btn" id="btnSave">📤<span class="menu-text">simpan</span></button>
        <button class="icon-btn" id="btnToggleSettings">🛠️<span class="menu-text">setting</span></button>
        <button class="icon-btn" id="btnToggleLayer">🗂️<span class="menu-text">layer</span></button>
    </div>

    <div id="settingsPanel" class="settings-panel">
        <div class="settings-row">
            <div class="input-group">
                <button class="icon-btn" id="btnNewCanvas" style="flex:none; width:auto; padding:5px;">📄<span class="menu-text">New</span></button>
                <label>W:</label><input type="number" id="canvasW" value="800">
            </div>
            <div class="input-group">
                <label>H:</label><input type="number" id="canvasH" value="800">
            </div>
            <span>Zoom: <span id="zoomVal">100</span>%</span>
        </div>

        <div class="slider-container">
             <div class="slider-row">
    <label>Kekerasan Soft:</label>
    <input type="range" id="softEdgeSlider" min="0" max="100" value="40">
    <span class="value-label" id="softEdgeVal">40</span>
</div>

            <div class="slider-row">
                <label>Ukuran Brush:</label>
                <input type="range" id="brushSize" min="10" max="3000" value="50">
                <span class="value-label" id="brushSizeVal">50</span>
            </div>
            <div class="slider-row">
                <label>Kepadatan:</label>
                <input type="range" id="densitySlider" min="1" max="50" value="15">
                <span class="value-label" id="densityVal">15</span>
            </div>
            <div class="slider-row">
                <label>Transparansi:</label>
                <input type="range" id="opacitySlider" min="0" max="100" value="100">
                <span class="value-label" id="opacityVal">100</span>
            </div>
            <div class="slider-row">
                <label>Kekuatan Wave:</label>
                <input type="range" id="waveStrength" min="1" max="50" value="15">
                <span class="value-label" id="waveStrengthVal">15</span>
            </div>
            <div class="slider-row">
                <label>Frekuensi Wave:</label>
                <input type="range" id="waveFrequency" min="1" max="20" value="5">
                <span class="value-label" id="waveFrequencyVal">5</span>
            </div>
            <div class="slider-row">
                <label>Arah Wave:</label>
                <input type="range" id="waveDirection" min="0" max="360" value="0">
                <span class="value-label" id="waveDirectionVal">0°</span>
            </div>
            <div class="wave-type-buttons">
                <button class="wave-type-btn active" id="waveTypeCircle">⚪ Bulat</button>
                <button class="wave-type-btn" id="waveTypeLine">📏 Garis Lurus</button>
            </div>
            <div class="slider-row">
                <label>Cermin Fade:</label>
                <input type="range" id="mirrorFadeSlider" min="0" max="100" value="25">
                <span class="value-label" id="mirrorFadeVal">25</span>
            </div>
            <div class="input-group">
                <label>Offset:</label>
                <input type="number" id="mirrorOffsetInput" value="0.9" step="0.1">
            </div>
        </div>
    </div>
</div>

<div id="canvasBox">
    <canvas id="viewCanvas"></canvas>
</div>

<div id="layerPanel">
    <button class="add-layer-btn" id="addLayerBtn">➕ Tambah Layer</button>
    <div id="layerList"></div>
</div>

<input type="file" id="imageInput" accept="image/*" hidden>
<input type="file" id="brushInput" accept="image/*" hidden>

<script>
    (function () {
        // === DOM Elements ===
        const canvasBox = document.getElementById("canvasBox");
        const canvas = document.getElementById("viewCanvas");
        const ctx = canvas.getContext("2d");
        const zoomValLabel = document.getElementById("zoomVal");
        const brushSlider = document.getElementById("brushSize");
        const brushSizeValLabel = document.getElementById("brushSizeVal");
        const densitySlider = document.getElementById("densitySlider");
        const densityValLabel = document.getElementById("densityVal");
        const opacitySlider = document.getElementById("opacitySlider");
        const opacityValLabel = document.getElementById("opacityVal");
        const waveStrengthSlider = document.getElementById("waveStrength");
        const waveStrengthVal = document.getElementById("waveStrengthVal");
        const waveFrequencySlider = document.getElementById("waveFrequency");
        const waveFrequencyVal = document.getElementById("waveFrequencyVal");
        const waveDirectionSlider = document.getElementById("waveDirection");
        const waveDirectionVal = document.getElementById("waveDirectionVal");
        
       
        
        // === DATA LAYER ===
         let strokesStack = [];
         let redoStack = [];
         
        let layers = [];
        let activeLayerIndex = 0;
        
        function createLayer(w, h) {
            let c = document.createElement("canvas");
            c.width = w;
            c.height = h;
            let layerCtx = c.getContext("2d");
            layerCtx.clearRect(0, 0, w, h);
            return {
                canvas: c,
                ctx: layerCtx,
                visible: true,
                name: "Layer " + (layers.length + 1)
            };
        }
        
        function getActiveCanvas() {
            if (!layers.length) return null;
            return layers[activeLayerIndex].canvas;
        }
        
        function getActiveCtx() {
            if (!layers.length) return null;
            return layers[activeLayerIndex].ctx;
        }
        
        function updateLayerUI() {
            const listDiv = document.getElementById("layerList");
            if (!listDiv) return;
            listDiv.innerHTML = "";
            layers.forEach((layer, idx) => {
                const layerDiv = document.createElement("div");
layerDiv.className = "layer-item" + (idx === activeLayerIndex ? " active-layer" : "");
layerDiv.dataset.index = idx;

          // === DRAG LAYER ===
layerDiv.addEventListener("touchstart", (e) => {
    dragLayerIndex = idx;
    isDraggingLayer = true;
    layerDiv.style.opacity = "0.5";
});

layerDiv.addEventListener("touchmove", (e) => {
    if (!isDraggingLayer) return;

    const touch = e.touches[0];
    const element = document.elementFromPoint(touch.clientX, touch.clientY);

    if (!element) return;

    const targetLayer = element.closest(".layer-item");
    if (!targetLayer) return;

    const targetIndex = parseInt(targetLayer.dataset.index);

    if (targetIndex !== dragLayerIndex) {
        const temp = layers[dragLayerIndex];
        layers.splice(dragLayerIndex, 1);
        layers.splice(targetIndex, 0, temp);

        dragLayerIndex = targetIndex;
        activeLayerIndex = targetIndex;

        updateLayerUI();
        renderAllLayers();
    }
});

layerDiv.addEventListener("touchend", () => {
    isDraggingLayer = false;
    dragLayerIndex = null;
    layerDiv.style.opacity = "1";
});
                
                const nameSpan = document.createElement("span");
                nameSpan.className = "layer-name";
                nameSpan.innerText = layer.name;
                nameSpan.onclick = () => selectLayer(idx);
                
                const actionsDiv = document.createElement("div");
                actionsDiv.className = "layer-actions";
                
                const eyeBtn = document.createElement("button");
                eyeBtn.innerText = layer.visible ? "👁️" : "👁️‍🗨️";
                eyeBtn.style.background = layer.visible ? "#4caf50" : "#777";
                eyeBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleLayerVisible(idx);
                };
                
                const delBtn = document.createElement("button");
                delBtn.innerText = "🗑️";
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (layers.length <= 1) {
                        alert("Minimal harus ada 1 layer!");
                        return;
                    }
                    removeLayer(idx);
                };
                
                actionsDiv.appendChild(eyeBtn);
                actionsDiv.appendChild(delBtn);
                layerDiv.appendChild(nameSpan);
                layerDiv.appendChild(actionsDiv);
                listDiv.appendChild(layerDiv);
            });
        }
        
        function selectLayer(index) {
            if (index >= 0 && index < layers.length) {
                activeLayerIndex = index;
                updateLayerUI();
                renderAllLayers();
            }
        }
        
        function toggleLayerVisible(index) {
            if (layers[index]) {
                layers[index].visible = !layers[index].visible;
                updateLayerUI();
                renderAllLayers();
            }
        }
        
        function addLayer() {
            if (!layers.length) return;
            const baseW = layers[0].canvas.width;
            const baseH = layers[0].canvas.height;
            const newLayer = createLayer(baseW, baseH);
            newLayer.name = "Layer " + (layers.length + 1);
            layers.push(newLayer);
            activeLayerIndex = layers.length - 1;
            updateLayerUI();
            renderAllLayers();
        }
        
        function removeLayer(index) {
            if (layers.length <= 1) return;
            layers.splice(index, 1);
            if (activeLayerIndex >= layers.length) activeLayerIndex = layers.length - 1;
            if (activeLayerIndex < 0) activeLayerIndex = 0;
            updateLayerUI();
            renderAllLayers();
        }
        
        // === History untuk layer aktif ===
        
        

        function saveFullState() {
    const snapshot = {
        width: layers[0].canvas.width,
        height: layers[0].canvas.height,
        layers: layers.map(l => {
            const c = document.createElement("canvas");
            c.width = l.canvas.width;
            c.height = l.canvas.height;
            c.getContext("2d").drawImage(l.canvas, 0, 0);
            return {
                canvas: c,
                visible: l.visible,
                name: l.name
            };
        })
    };

    strokesStack.push(snapshot);
    if (strokesStack.length > 30) strokesStack.shift();
    redoStack = [];
}
        
        function undo() {
    if (strokesStack.length === 0) return;

    const currentState = {
        width: layers[0].canvas.width,
        height: layers[0].canvas.height,
        layers: layers
    };

    redoStack.push(currentState);

    const prev = strokesStack.pop();

    // restore ukuran
    layers = [];

    prev.layers.forEach(l => {
        const newLayer = createLayer(prev.width, prev.height);
        newLayer.ctx.drawImage(l.canvas, 0, 0);
        newLayer.visible = l.visible;
        newLayer.name = l.name;
        layers.push(newLayer);
    });

    activeLayerIndex = 0;

    renderAllLayers();
    updateLayerUI();
}

function redo() {
    if (redoStack.length === 0) return;

    const next = redoStack.pop();

    strokesStack.push({
        width: layers[0].canvas.width,
        height: layers[0].canvas.height,
        layers: layers
    });

    layers = [];

    next.layers.forEach(l => {
        const newLayer = createLayer(next.width, next.height);
        newLayer.ctx.drawImage(l.canvas, 0, 0);
        newLayer.visible = l.visible;
        newLayer.name = l.name;
        layers.push(newLayer);
    });

    activeLayerIndex = 0;

    renderAllLayers();
    updateLayerUI();
}

        
        let globalDrawCanvas = null;
        let globalDrawCtx = null;
        
        function renderAllLayers() {
            if (!layers.length) return;
            const w = layers[0].canvas.width;
            const h = layers[0].canvas.height;
            const tempCanvas = document.createElement("canvas");
            tempCanvas.width = w;
            tempCanvas.height = h;
            const tempCtx = tempCanvas.getContext("2d");
            tempCtx.clearRect(0, 0, w, h);
            layers.forEach(layer => {
                if (layer.visible) {
                    tempCtx.drawImage(layer.canvas, 0, 0);
                }
            });
            if (!globalDrawCanvas) {
                globalDrawCanvas = document.createElement("canvas");
                globalDrawCtx = globalDrawCanvas.getContext("2d");
            }
            globalDrawCanvas.width = w;
            globalDrawCanvas.height = h;
            globalDrawCtx.clearRect(0, 0, w, h);
            globalDrawCtx.drawImage(tempCanvas, 0, 0);
            renderView();
        }
        
        // View transform
        let scale = 1.0;
        let offsetX = 0, offsetY = 0;
        
        function renderView() {
    if (!ctx || !globalDrawCanvas) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);

// 🔥 background putih (hanya tampilan, bukan layer)
ctx.fillStyle = "#f0f0f0";
ctx.fillRect(0, 0, globalDrawCanvas.width, globalDrawCanvas.height);

    ctx.drawImage(globalDrawCanvas, 0, 0);
    ctx.strokeStyle = "#009fd9";
    ctx.lineWidth = 2 / scale;
    ctx.strokeRect(0, 0, globalDrawCanvas.width, globalDrawCanvas.height);

    // 🔥 ROPE PREVIEW (BRUSH)
    if (ropeModeEnabled && isRopeActive && brush) {

        const dist = Math.hypot(ropeEndX - ropeStartX, ropeEndY - ropeStartY);
        const step = brushSizeValue / (densityValue * 1.2);
        const steps = Math.max(1, Math.ceil(dist / step));

        ctx.globalAlpha = 0.4; // transparan preview

        for (let i = 0; i <= steps; i++) {
            const t = i / steps;

            const x = ropeStartX + (ropeEndX - ropeStartX) * t;
            const y = ropeStartY + (ropeEndY - ropeStartY) * t;

            const size = brushSizeValue;

            const ratio = brush.width / brush.height;
            let dw = ratio >= 1 ? size : size * ratio;
            let dh = ratio >= 1 ? size / ratio : size;

            ctx.save();
            
ctx.translate(x, y);

// 🔥 ROTASI DITAMBAHKAN DI SINI
ctx.rotate(brushRotation * Math.PI / 180);

ctx.scale(flipX, flipY);

ctx.drawImage(brush, -dw/2, -dh/2, dw, dh);

ctx.restore();
        }

        ctx.globalAlpha = 1;
}

        ctx.restore();

    zoomValLabel.innerText = Math.round(scale * 100);
}
        
        // === Brush & efek ===
        let brush = null;
        let mode = "move";
        let softBrushEnabled = false;
        let softEdge = 0.4; // default (0.4 = normal)
        let brushSizeValue = 50;
        let densityValue = 15;
        let opacityValue = 1.0;
        let flipX = 1, flipY = 1;
        let mirrorMode = false;
        let mirrorOffsetFactor = 0.9;
        let mirrorFade = 0.25;
        
        let waveBrushEnabled = false;
        let waveType = "circle";
        let waveStrength = 15;
        let waveFrequency = 5;
        let waveDirection = 0;
        let waveTime = 0;
        
        let ropeModeEnabled = false;
        let isRopeActive = false;
        let ropeStartX = 0, ropeStartY = 0, ropeEndX = 0, ropeEndY = 0;
        let isDrawing = false;
        let lastDrawX = 0, lastDrawY = 0;

let brushRotation = 0;
let rotateClickCount = 0;

let dragLayerIndex = null;
let isDraggingLayer = false;
        
        // Seamless shift
        let shiftStartX = 0, shiftStartY = 0;
        const GRID_SIZE = 50;
        
        // Interaksi view
        let isDragging = false;
        let lastPointerX = 0, lastPointerY = 0;
        let initialPinchDist = null, initialScale = 1.0, pinchCenterX = 0, pinchCenterY = 0;
        
        // Fungsi menggambar pada layer aktif
        function drawSoftBrushOnActive(x, y, size, opacity) {
            if (!brush) return;
            const activeCtx = getActiveCtx();
            if (!activeCtx) return;
            const minSide = Math.min(brush.width, brush.height);
            const scaleVal = size / minSide;
            const drawW = brush.width * scaleVal;
            const drawH = brush.height * scaleVal;
            const temp = document.createElement("canvas");
            temp.width = size;
            temp.height = size;
            const tctx = temp.getContext("2d");
            const offX = (size - drawW) / 2;
            const offY = (size - drawH) / 2;
            tctx.drawImage(brush, offX, offY, drawW, drawH);
            const gradient = tctx.createRadialGradient(
    size/2, size/2, 0,
    size/2, size/2, size/2
);

// 🔥 bagian tengah tetap solid
gradient.addColorStop(0, `rgba(0,0,0,${opacity})`);
gradient.addColorStop(softEdge, `rgba(0,0,0,${opacity})`);
gradient.addColorStop(1, `rgba(0,0,0,0)`);

            tctx.globalCompositeOperation = "destination-in";
            tctx.fillStyle = gradient;
            tctx.fillRect(0, 0, size, size);
            activeCtx.save();
            activeCtx.translate(x, y);

// 🔥 ROTASI MASUK DI SINI
activeCtx.rotate(brushRotation * Math.PI / 180);

activeCtx.scale(flipX, flipY);
            activeCtx.drawImage(temp, -size/2, -size/2);
            activeCtx.restore();
        }
        
        function drawBrushOnActive(x, y, currentOpacity) {
            if (!brush) return;
            const activeCtx = getActiveCtx();
            if (!activeCtx) return;
            const size = brushSizeValue;
            const ratio = brush.width / brush.height;
            let dw = ratio >= 1 ? size : size * ratio;
            let dh = ratio >= 1 ? size / ratio : size;
            if (softBrushEnabled) {
                drawSoftBrushOnActive(x, y, size, currentOpacity);
            } else {
                activeCtx.save();
                activeCtx.translate(x, y);
activeCtx.rotate(brushRotation * Math.PI / 180);
activeCtx.scale(flipX, flipY);
                activeCtx.globalAlpha = currentOpacity;
                activeCtx.drawImage(brush, -dw/2, -dh/2, dw, dh);
                activeCtx.restore();
            }
            if (mirrorMode) {
                const mirrorY = y + (brushSizeValue * mirrorOffsetFactor);
                if (softBrushEnabled) {
                    drawSoftBrushOnActive(x, mirrorY, size, currentOpacity * mirrorFade);
                } else {
                    activeCtx.save();
                    activeCtx.translate(x, mirrorY);
                    activeCtx.scale(flipX, -flipY);
                    activeCtx.globalAlpha = currentOpacity * mirrorFade;
                    activeCtx.drawImage(brush, -dw/2, -dh/2, dw, dh);
                    activeCtx.restore();
                }
            }
        }
        
        function applyWaveEffectOnActive(x, y, radius) {
            if (!waveBrushEnabled) return;
            const activeCtx = getActiveCtx();
            const activeCanvas = getActiveCanvas();
            if (!activeCtx) return;
            const w = activeCanvas.width, h = activeCanvas.height;
            const startX = Math.max(0, Math.floor(x - radius));
            const startY = Math.max(0, Math.floor(y - radius));
            const endX = Math.min(w, Math.ceil(x + radius));
            const endY = Math.min(h, Math.ceil(y + radius));
            const width = endX - startX, height = endY - startY;
            if (width <= 0 || height <= 0) return;
            const tempArea = document.createElement("canvas");
            tempArea.width = width; tempArea.height = height;
            const tempCtxArea = tempArea.getContext("2d");
            tempCtxArea.drawImage(activeCanvas, startX, startY, width, height, 0, 0, width, height);
            const imageData = tempCtxArea.getImageData(0,0,width,height);
            const data = imageData.data;
            const newData = new Uint8ClampedArray(data.length);
            const centerX = x - startX, centerY = y - startY;
            const dirRad = waveDirection * Math.PI/180;
            const dirX = Math.cos(dirRad), dirY = Math.sin(dirRad);
            const perpX = -dirY, perpY = dirX;
            for (let py=0; py<height; py++) {
                for (let px=0; px<width; px++) {
                    const dx = px - centerX, dy = py - centerY;
                    let distance, waveOffset;
                    if (waveType === "circle") {
                        distance = Math.hypot(dx, dy);
                        if (distance < radius) {
                            const intensity = (1 - distance/radius) * waveStrength;
                            const angle = Math.atan2(dy, dx);
                            waveOffset = Math.sin(distance * waveFrequency * 0.2 + waveTime) * intensity;
                            let srcX = px + Math.cos(angle)*waveOffset;
                            let srcY = py + Math.sin(angle)*waveOffset;
                            srcX = Math.min(width-1, Math.max(0, srcX));
                            srcY = Math.min(height-1, Math.max(0, srcY));
                            const srcIdx = (Math.floor(srcY)*width + Math.floor(srcX))*4;
                            const dstIdx = (py*width+px)*4;
                            newData[dstIdx]=data[srcIdx]; newData[dstIdx+1]=data[srcIdx+1]; newData[dstIdx+2]=data[srcIdx+2]; newData[dstIdx+3]=data[srcIdx+3];
                        } else { const idx=(py*width+px)*4; newData[idx]=data[idx]; newData[idx+1]=data[idx+1]; newData[idx+2]=data[idx+2]; newData[idx+3]=data[idx+3]; }
                    } else {
                        distance = Math.abs(dx*dirX + dy*dirY);
                        const perpDist = dx*perpX + dy*perpY;
                        if (distance < radius) {
                            const intensity = (1 - distance/radius) * waveStrength;
                            waveOffset = Math.sin(perpDist * waveFrequency * 0.15 + waveTime) * intensity;
                            let srcX = px + dirX*waveOffset;
                            let srcY = py + dirY*waveOffset;
                            srcX = Math.min(width-1, Math.max(0, srcX));
                            srcY = Math.min(height-1, Math.max(0, srcY));
                            const srcIdx = (Math.floor(srcY)*width+Math.floor(srcX))*4;
                            const dstIdx = (py*width+px)*4;
                            newData[dstIdx]=data[srcIdx]; newData[dstIdx+1]=data[srcIdx+1]; newData[dstIdx+2]=data[srcIdx+2]; newData[dstIdx+3]=data[srcIdx+3];
                        } else { const idx=(py*width+px)*4; newData[idx]=data[idx]; newData[idx+1]=data[idx+1]; newData[idx+2]=data[idx+2]; newData[idx+3]=data[idx+3]; }
                    }
                }
            }
            const newImageData = new ImageData(newData, width, height);
            tempCtxArea.putImageData(newImageData, 0, 0);
            activeCtx.drawImage(tempArea, startX, startY);
        }
        
        function drawWaveBrushOnActive(x, y) {
            if (!brush) return;
            drawBrushOnActive(x, y, opacityValue);
            const radius = brushSizeValue * 0.8;
            applyWaveEffectOnActive(x, y, radius);
        }
        
        function drawLineContinuousActive(x1,y1,x2,y2) {
            if (!brush) return;
            const dist = Math.hypot(x2-x1,y2-y1);
            if (dist===0) { waveBrushEnabled?drawWaveBrushOnActive(x1,y1):drawBrushOnActive(x1,y1,opacityValue); return; }
            const step = brushSizeValue/(densityValue*1.2);
            const steps = Math.max(1, Math.ceil(dist/step));
            for(let i=0;i<=steps;i++) {
                const t=i/steps;
                const x=x1+(x2-x1)*t, y=y1+(y2-y1)*t;
                if(waveBrushEnabled) drawWaveBrushOnActive(x,y);
                else drawBrushOnActive(x,y,opacityValue);
            }
        }
        
        function startDrawOrRope(internal) {
             
            if (!brush) return;
            if (ropeModeEnabled) {
                ropeStartX = internal.x; ropeStartY = internal.y;
                ropeEndX = internal.x; ropeEndY = internal.y;
                isRopeActive = true;
            } else {
                if (internal.x>=0 && internal.x<=getActiveCanvas().width && internal.y>=0 && internal.y<=getActiveCanvas().height) {
                    saveFullState();
                    lastDrawX=internal.x; lastDrawY=internal.y;
                    isDrawing=true;
                    if(waveBrushEnabled) drawWaveBrushOnActive(internal.x,internal.y);
                    else drawBrushOnActive(internal.x,internal.y, opacityValue);
                    renderAllLayers();
                }
            }
        }
        
        function moveDrawOrRope(internal) {
            if(ropeModeEnabled && isRopeActive) {
                ropeEndX=internal.x; ropeEndY=internal.y;
                renderAllLayers();
            } else if(!ropeModeEnabled && isDrawing) {
                if(internal.x>=0 && internal.x<=getActiveCanvas().width && internal.y>=0 && internal.y<=getActiveCanvas().height) {
                    drawLineContinuousActive(lastDrawX, lastDrawY, internal.x, internal.y);
                    lastDrawX=internal.x; lastDrawY=internal.y;
                    renderAllLayers();
                }
            }
        }
        
        function commitRope() {
            if(isRopeActive && brush) {
                saveFullState();
                drawLineContinuousActive(ropeStartX, ropeStartY, ropeEndX, ropeEndY);
                renderAllLayers();
                isRopeActive=false;
            }
        }
        
        function applySeamlessShiftLayer(deltaX, deltaY) {
            const activeCanvas = getActiveCanvas();
            const activeCtx = getActiveCtx();
            if(!activeCanvas) return false;
            const gridX = Math.round(deltaX/GRID_SIZE)*GRID_SIZE;
            const gridY = Math.round(deltaY/GRID_SIZE)*GRID_SIZE;
            if(gridX===0 && gridY===0) return false;
            let shiftX = gridX % activeCanvas.width, shiftY = gridY % activeCanvas.height;
            if(shiftX<0) shiftX+=activeCanvas.width;
            if(shiftY<0) shiftY+=activeCanvas.height;
            const tempCanvas = document.createElement("canvas");
            tempCanvas.width=activeCanvas.width; tempCanvas.height=activeCanvas.height;
            const tCtx = tempCanvas.getContext("2d");
            tCtx.drawImage(activeCanvas,0,0);
            activeCtx.clearRect(0,0,activeCanvas.width,activeCanvas.height);
            activeCtx.drawImage(tempCanvas, shiftX, shiftY);
            activeCtx.drawImage(tempCanvas, shiftX - activeCanvas.width, shiftY);
            activeCtx.drawImage(tempCanvas, shiftX, shiftY - activeCanvas.height);
            activeCtx.drawImage(tempCanvas, shiftX - activeCanvas.width, shiftY - activeCanvas.height);
            return true;
        }
        
        // Event handlers
        function getInternalCoord(clientX,clientY) { const rect=canvas.getBoundingClientRect(); return { x:(clientX-rect.left-offsetX)/scale, y:(clientY-rect.top-offsetY)/scale }; }
        function startInteraction(clientX,clientY) { if(mode==="draw" && brush) startDrawOrRope(getInternalCoord(clientX,clientY)); else if(mode==="shift") { saveFullState(); shiftStartX=clientX; shiftStartY=clientY; } isDragging=true; lastPointerX=clientX; lastPointerY=clientY; }
        function moveInteraction(clientX,clientY) { if(!isDragging) return; if(mode==="move") { offsetX+=clientX-lastPointerX; offsetY+=clientY-lastPointerY; lastPointerX=clientX; lastPointerY=clientY; renderView(); } else if(mode==="draw" && brush) moveDrawOrRope(getInternalCoord(clientX,clientY)); else if(mode==="shift") { lastPointerX=clientX; lastPointerY=clientY; } }
        function endInteraction() { if(mode==="draw" && brush) { if(ropeModeEnabled && isRopeActive) commitRope(); isDrawing=false; waveTime+=0.5; } else if(mode==="shift" && isDragging) { const startP=getInternalCoord(shiftStartX,shiftStartY); const endP=getInternalCoord(lastPointerX,lastPointerY); const deltaX=endP.x-startP.x, deltaY=endP.y-startP.y; if(!applySeamlessShiftLayer(deltaX,deltaY) && strokesStack.length>0) strokesStack.pop(); renderAllLayers(); } isDragging=false; isRopeActive=false; }
        
        canvas.addEventListener('touchstart',(e)=>{ e.preventDefault(); if(e.touches.length===2) { const t1=e.touches[0],t2=e.touches[1]; initialPinchDist=Math.hypot(t1.pageX-t2.pageX,t1.pageY-t2.pageY); initialScale=scale; const cx=(t1.pageX+t2.pageX)/2, cy=(t1.pageY+t2.pageY)/2; const pt=getInternalCoord(cx,cy); pinchCenterX=pt.x; pinchCenterY=pt.y; } else if(e.touches.length===1) startInteraction(e.touches[0].pageX,e.touches[0].pageY); });
        canvas.addEventListener('touchmove',(e)=>{ e.preventDefault(); if(e.touches.length===2 && initialPinchDist) { const t1=e.touches[0],t2=e.touches[1]; const newDist=Math.hypot(t1.pageX-t2.pageX,t1.pageY-t2.pageY); let newScale=Math.min(15,Math.max(0.05,initialScale*(newDist/initialPinchDist))); const cx=(t1.pageX+t2.pageX)/2, cy=(t1.pageY+t2.pageY)/2; const rect=canvas.getBoundingClientRect(); offsetX=cx-rect.left-(pinchCenterX*newScale); offsetY=cy-rect.top-(pinchCenterY*newScale); scale=newScale; renderView(); } else if(e.touches.length===1) moveInteraction(e.touches[0].pageX,e.touches[0].pageY); });
        
       canvas.addEventListener('touchend', (e) => {
    // Jika pinch selesai (dari 2 jadi <2)
    if (e.touches.length < 2) {
        initialPinchDist = null;
    }

    // 🔥 FIX: kalau masih ada 1 jari, reset drag biar tidak loncat
    if (e.touches.length === 1) {
    lastPointerX = e.touches[0].pageX;
    lastPointerY = e.touches[0].pageY;

    // ✅ JANGAN paksa drag
    isDragging = false;
}

    // Jika semua jari lepas
    if (e.touches.length === 0) {
        endInteraction();
    }
});

        canvas.addEventListener('mousedown',(e)=>startInteraction(e.pageX,e.pageY));
        window.addEventListener('mousemove',(e)=>moveInteraction(e.pageX,e.pageY));
        window.addEventListener('mouseup',endInteraction);
        
        function centerCamera() { if(globalDrawCanvas){ offsetX=50; offsetY=80; scale=Math.min((window.innerWidth-100)/globalDrawCanvas.width,(window.innerHeight-200)/globalDrawCanvas.height,2); scale=Math.max(0.1,scale); renderView(); } }
        
        // Inisialisasi UI dan event binding
        function init() {
            canvas.width=window.innerWidth; canvas.height=window.innerHeight;
            const defaultLayer=createLayer(800,800);
            layers=[defaultLayer];
            activeLayerIndex=0;
            globalDrawCanvas=document.createElement("canvas");
            globalDrawCtx=globalDrawCanvas.getContext("2d");
            renderAllLayers();
            centerCamera();
            updateLayerUI();
            
            // Binding tombol
            document.getElementById("btnLoadImage").onclick=()=>document.getElementById("imageInput").click();
            document.getElementById("imageInput").onchange=(e)=>{
                const file=e.target.files[0]; if(!file) return;
                const reader=new FileReader();
                reader.onload=(ev)=>{ const img=new Image(); img.onload=()=>{ layers.forEach(layer=>{ layer.canvas.width=img.width; layer.canvas.height=img.height; layer.ctx.clearRect(0,0,img.width,img.height); if(layer===layers[activeLayerIndex]) layer.ctx.drawImage(img,0,0); }); document.getElementById("canvasW").value=img.width; document.getElementById("canvasH").value=img.height; renderAllLayers(); strokesStack=[]; redoStack=[]; }; img.src=ev.target.result; };
                reader.readAsDataURL(file);
            };
            document.getElementById("btnLoadBrush").onclick=()=>document.getElementById("brushInput").click();
            document.getElementById("brushInput").onchange=(e)=>{ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=(ev)=>{ brush=new Image(); brush.onload=()=>{ if(mode!=="draw") setMode("draw"); }; brush.src=ev.target.result; }; reader.readAsDataURL(file); };
            document.getElementById("btnSave").onclick = () => {

    const baseCanvas = document.createElement("canvas");
    baseCanvas.width = layers[0].canvas.width;
    baseCanvas.height = layers[0].canvas.height;

    const baseCtx = baseCanvas.getContext("2d");

    // 🔥 gabungkan semua layer
    layers.forEach(l => {
        if (l.visible) baseCtx.drawImage(l.canvas, 0, 0);
    });

    // 🔥 langsung pakai hasil (tanpa wrap lagi)
    const finalCanvas = baseCanvas;

    // 🔥 simpan
    const link = document.createElement("a");
    link.download = "texture_" + Date.now() + ".png";
    link.href = finalCanvas.toDataURL();
    link.click();
};
            
            window.setMode = (m) => { mode=m; document.getElementById("btnDraw").classList.toggle("active", m==="draw"); document.getElementById("btnMove").classList.toggle("active", m==="move"); document.getElementById("btnShift").classList.toggle("active", m==="shift"); isRopeActive=false; isDrawing=false; };
            window.toggleWaveBrush = () => {
    waveBrushEnabled = !waveBrushEnabled;
    document.getElementById("btnWaveBrush")
        .classList.toggle("active", waveBrushEnabled);
};

window.toggleRopeMode = () => {
    ropeModeEnabled = !ropeModeEnabled;
    document.getElementById("btnRopeMode")
        .classList.toggle("active", ropeModeEnabled);
};
            window.toggleSoftBrush = () => { softBrushEnabled=!softBrushEnabled; document.getElementById("btnSoftBrush").classList.toggle("active",softBrushEnabled); };
            window.toggleFlipX = () => { flipX*=-1; document.getElementById("btnFlipX").classList.toggle("active",flipX===-1); };
            window.toggleFlipY = () => { flipY*=-1; document.getElementById("btnFlipY").classList.toggle("active",flipY===-1); };
            window.toggleMirror = () => { mirrorMode=!mirrorMode; document.getElementById("btnMirror").classList.toggle("active",mirrorMode); };
            window.setWaveType = (t) => { waveType=t; document.getElementById("waveTypeCircle").classList.toggle("active",t==="circle"); document.getElementById("waveTypeLine").classList.toggle("active",t==="line"); };
            
            document.getElementById("btnDraw").onclick=()=>setMode("draw");
            document.getElementById("btnMove").onclick=()=>setMode("move");
            document.getElementById("btnShift").onclick=()=>setMode("shift");
            document.getElementById("btnWaveBrush").onclick=()=>toggleWaveBrush();
            document.getElementById("btnRopeMode").onclick=()=>toggleRopeMode();
            document.getElementById("btnSoftBrush").onclick=()=>toggleSoftBrush();
            document.getElementById("btnFlipX").onclick=()=>toggleFlipX();
            document.getElementById("btnFlipY").onclick=()=>toggleFlipY();
            document.getElementById("btnMirror").onclick=()=>toggleMirror();
            document.getElementById("btnUndo").onclick=()=>undo();
            document.getElementById("btnRedo").onclick=()=>redo();
            document.getElementById("addLayerBtn").onclick=()=>addLayer();
            document.getElementById("btnToggleLayer").onclick=()=>{ const p=document.getElementById("layerPanel"); p.style.display = p.style.display==="block"?"none":"block"; };
            document.getElementById("btnToggleSettings").onclick=()=>{ const p=document.getElementById("settingsPanel"); p.style.display = p.style.display==="block"?"none":"block"; };
            document.getElementById("btnNewCanvas").onclick=()=>{ const w=parseInt(document.getElementById("canvasW").value)||800; const h=parseInt(document.getElementById("canvasH").value)||800; layers.forEach(layer=>{ layer.canvas.width=w; layer.canvas.height=h; layer.ctx.clearRect(0,0,w,h); }); renderAllLayers(); strokesStack=[]; redoStack=[]; };
            document.getElementById("waveTypeCircle").onclick=()=>setWaveType("circle");
            document.getElementById("waveTypeLine").onclick=()=>setWaveType("line");
            
            brushSlider.oninput=()=>{ brushSizeValue=parseInt(brushSlider.value); brushSizeValLabel.innerText=brushSizeValue; };
            densitySlider.oninput=()=>{ densityValue=parseInt(densitySlider.value); densityValLabel.innerText=densityValue; };
            opacitySlider.oninput=()=>{ opacityValue=opacitySlider.value/100; opacityValLabel.innerText=opacitySlider.value; };
            waveStrengthSlider.oninput=()=>{ waveStrength=parseInt(waveStrengthSlider.value); waveStrengthVal.innerText=waveStrength; };
            waveFrequencySlider.oninput=()=>{ waveFrequency=parseInt(waveFrequencySlider.value); waveFrequencyVal.innerText=waveFrequency; };
            waveDirectionSlider.oninput=()=>{ waveDirection=parseInt(waveDirectionSlider.value); waveDirectionVal.innerText=waveDirection+"°"; };
            document.getElementById("mirrorFadeSlider").oninput=()=>{ mirrorFade=document.getElementById("mirrorFadeSlider").value/100; document.getElementById("mirrorFadeVal").innerText=document.getElementById("mirrorFadeSlider").value; };
            document.getElementById("mirrorOffsetInput").oninput=(e)=>mirrorOffsetFactor=parseFloat(e.target.value)||0.9;
        }

       const softEdgeSlider = document.getElementById("softEdgeSlider");
const softEdgeVal = document.getElementById("softEdgeVal");

softEdgeSlider.oninput = () => {
    softEdge = softEdgeSlider.value / 100;
    softEdgeVal.innerText = softEdgeSlider.value;
};

document.getElementById("btnRotate").onclick = () => {

    // tambah 90 derajat tiap klik
    brushRotation = (brushRotation + 90) % 360;

    // indikator tombol aktif
    document.getElementById("btnRotate")
        .classList.toggle("active", brushRotation !== 0);

    // 🔥 penting: refresh canvas
    renderAllLayers();
};

function drawCircularMap(srcCanvas, dstCtx) {
    const w = srcCanvas.width;
    const h = srcCanvas.height;

    // ukuran output (canvas tujuan)
    const size = dstCtx.canvas.width;

    const radius = size / 2;
    const centerX = size / 2;
    const centerY = size / 2;

    const srcCtx = srcCanvas.getContext("2d");
    const srcData = srcCtx.getImageData(0, 0, w, h).data;

    const imageData = dstCtx.createImageData(size, size);
    const data = imageData.data;

    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {

            const dx = x - centerX;
            const dy = y - centerY;

            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist <= radius) {

                const angle = Math.atan2(dy, dx);
                let u = (angle + Math.PI) / (Math.PI * 2);

                let v = dist / radius;

                const srcX = Math.floor(u * w);
                const srcY = Math.floor(v * h);

                const srcIndex = (srcY * w + srcX) * 4;
                const dstIndex = (y * size + x) * 4;

                data[dstIndex] = srcData[srcIndex];
                data[dstIndex + 1] = srcData[srcIndex + 1];
                data[dstIndex + 2] = srcData[srcIndex + 2];
                data[dstIndex + 3] = srcData[srcIndex + 3];
            }
        }
    }

    dstCtx.putImageData(imageData, 0, 0);
}

document.getElementById("btnCircularWrap").onclick = () => {
    applyCircularWrap();
};


function applyCircularWrap() {

    // ✅ simpan state sebelum perubahan
    saveFullState();

    const baseCanvas = document.createElement("canvas");
    baseCanvas.width = layers[0].canvas.width;
    baseCanvas.height = layers[0].canvas.height;

    const baseCtx = baseCanvas.getContext("2d");

    layers.forEach(l => {
        if (l.visible) baseCtx.drawImage(l.canvas, 0, 0);
    });

    const size = Math.max(baseCanvas.width, baseCanvas.height);

    const newCanvas = document.createElement("canvas");
    newCanvas.width = size;
    newCanvas.height = size;

    const nctx = newCanvas.getContext("2d");

    drawCircularMap(baseCanvas, nctx);

    // replace isi layer
    layers = [];

    const newLayer = createLayer(size, size);
    newLayer.ctx.drawImage(newCanvas, 0, 0);

    layers.push(newLayer);
    activeLayerIndex = 0;

    renderAllLayers();
    centerCamera();
}
        init();
    })();
