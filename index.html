<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css?v=1.0">
    
     <!-- ICON -->
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
    background:#111;
    margin:0;
    color:white;
}

/* tombol biasa */
.btn {
    background-color: #4CAF50;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    margin: 5px;
}

/* 🔥 GRID MENU (INI YANG PENTING) */
.menu {
    display: grid;
    grid-template-columns: repeat(6, 1fr); /* 6 icon per baris */
    gap: 10px;
    padding: 10px;
}

/* ICON BUTTON */
.btn-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    padding: 10px;
    border-radius: 20px;
    transition: 0.2s;
}

/* ICON */
.btn-icon img {
    width: 100px;
    height: 100px;
    border-radius: 15px;
}

/* TEXT */
.label {
    margin-top: 6px;
    font-size: 20px;
    color: white;
    text-align: center;
}

/* efek tekan */
.btn-icon:active {
    background: rgba(255,255,255,0.2);
}

.btn-icon:active img {
    transform: scale(0.9);
}

</style>
</head>

<body>

<h2 style="text-align:center;">Apps</h2>

<!-- 🔥 MENU GRID -->
<div class="menu">


    <button class="btn-icon" onclick="indexMenggambar()">
        <img src="https://jajanghermansyah.github.io/App-/menggambar.jpg">
        <span class="label">Menggambar</span>
    </button>

   <button class="btn-icon" onclick="OBJview()">
       <img src="https://jajanghermansyah.github.io/App-/objview.jpg">
       <span class="label">OBJview</span>
    </button>

    

</div>

<div id="display-area"></div>

<script>


function indexMenggambar() {
    window.location.href = "https://jajanghermansyah.github.io/App-/indexMenggambar.html";
}

function OBJview() {
    window.location.href =
    "https://jajanghermansyah.github.io/App-/indexOBJview.html";
}

</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
  .then(function(reg){
    console.log("Service Worker aktif", reg);
  }).catch(function(err){
    console.log("Service Worker gagal", err);
  });
        }
</script>

</body>
</html>
