<!DOCTYPE html>
<html>
<head>
<style>
body{
    background:#111;
    margin:0;
    color:white;
}

/* tombol biasa */
.btn {
    background-color: #4CAF50;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    margin: 5px;
}

/* 🔥 GRID MENU (INI YANG PENTING) */
.menu {
    display: grid;
    grid-template-columns: repeat(6, 1fr); /* 6 icon per baris */
    gap: 10px;
    padding: 10px;
}

/* ICON BUTTON */
.btn-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    padding: 10px;
    border-radius: 20px;
    transition: 0.2s;
}

/* ICON */
.btn-icon img {
    width: 100px;
    height: 100px;
    border-radius: 15px;
}

/* TEXT */
.label {
    margin-top: 6px;
    font-size: 20px;
    color: white;
    text-align: center;
}

/* efek tekan */
.btn-icon:active {
    background: rgba(255,255,255,0.2);
}

.btn-icon:active img {
    transform: scale(0.9);
}

</style>
</head>

<body>

<h2 style="text-align:center;">Apps</h2>

<!-- 🔥 MENU GRID -->
<div class="menu">


    <button class="btn-icon" onclick="indexMenggambar()">
        <img src="<img src="https://jajanghermansyah.github.io/menggambar.jpg">
        <span class="label">Menggambar</span>
    </button>

   <button class="btn-icon" onclick="OBJview()">
       <img src="<img src="https://jajanghermansyah.github.io/objview.jpg">
       <span class="label">OBJview</span>
    </button>

    <!-- Tambah saja, nanti otomatis turun -->
    <button class="btn-icon" onClick="susungear()"><img src="file:///android_asset/icon/susungear.png"><span class="label">Susun Gear</span></button>
    <button class="btn-icon" onClick="susunAngka()"><img src="file:///android_asset/icon/susunangka.jpg"><span class="label">Susun Angka</span></button>
    <button class="btn-icon"><img src="https://hermansyahj68-jpg.github.io/icon/icon3.png"><span class="label">App 3</span></button>
    <button class="btn-icon"><img src="file:///android_asset/icon/icon4.png"><span class="label">App 4</span></button>

</div>

<div id="display-area"></div>

<script>


function indexMenggambar() {
    window.location.href = "https://jajanghermansyah.github.io/indexMenggambar.html";
}

function OBJview() {
    window.location.href = "https://hermansyahj68-jpg.github.io/indexOBJview.html";
}

</script>

</body>
</html>
